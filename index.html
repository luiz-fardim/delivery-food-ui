<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Food</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div id="icone">
            <i class="fa-solid fa-burger fa-5x"></i>
        </div>
        <h1> DeliveryFood</h1>
        <p>Seja bem-vindo de volta!</p>
    </header>
    <article>
        <section>
            <h2> Entrar na sua conta</h2>
            <div id="form">
                <label>
                    E-mail:
                    <i class="fa-solid fa-envelope" id="icone-email"></i>
                    <input type="text" placeholder="seu@email.com" class="input">
                </label>

                <div id="senha">
                    <div>Senha:</div>
                    <div><a href="#">Esqueceu?</a></div>
                </div>

                <label>
                    <i class="fa-solid fa-lock" id="icone-senha"></i>
                    <input type="password" placeholder="Digite sua senha" class="input">
                </label>

                </label>
                <button>Entrar</button>
            </div>
            <div>
                <p>Não tem uma conta? <a href="#">Cadastre-se grátis</a></p>
                <hr>
                <p>ou continue com</p>
                <hr>
                <button><i class="fa-brands fa-google"></i> Google</button>
                <button><i class="fa-brands fa-facebook-f"></i> Facebook</button>
            </div>
        </section>
    </article>
    <footer>
        <p>© 2026 DeliveryFood. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
